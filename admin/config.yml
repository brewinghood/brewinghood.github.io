backend:
    name: github
    repo: onedaywebsites/brewinghood
    branch: main
    base_url: https://sveltia-cms-auth.onedaywebsites-channel.workers.dev

media_folder: "assets/uploads"

collections:
    - name: "site_settings"
      label: "Site Settings"
      icon: "settings"
      files:
          - name: "general"
            label: "Site Settings"
            file: "_data/settings.yml"
            fields:
                - { label: "Business Name", name: "business_name", widget: "string" }
                - label: "Social Accounts"
                  name: "social_accounts"
                  widget: "list"
                  label_singular: "Social Account"
                  fields:
                      - { label: "Name", name: "name", widget: "string" }
                      - {
                            label: "Icon (FA Class)",
                            name: "icon",
                            widget: "string",
                            hint: "Full class string e.g. fa-brands fa-instagram or fa-solid fa-location-dot from fontawesome.com",
                        }
                      - { label: "URL", name: "url", widget: "string" }
                - { label: "Hours", name: "hours", widget: "string" }
                - { label: "Hours Note", name: "hours_note", widget: "string" }
                - { label: "Background Image", name: "background_image", widget: "image" }
                - { label: "Beans Section Heading", name: "beans_heading", widget: "string" }
                - { label: "Beans Section Copy", name: "beans_copy", widget: "text" }
                - { label: "Menu Section Title", name: "menu_title", widget: "string" }
                - { label: "Menu Section Copy", name: "menu_copy", widget: "text" }

    - name: "beans"
      label: "Beans"
      icon: "coffee"
      folder: "_data/beans"
      create: true
      slug: "{{slug}}"
      extension: yml
      format: yml
      identifier_field: "country_name"
      summary: "{{country_name}} — {{title}}"
      sortable_fields: ["order", "country_name", "title"]
