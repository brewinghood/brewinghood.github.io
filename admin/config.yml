    - name: "menu"
      label: "Menu"
      icon: "restaurant_menu"
      folder: "_data/menu_sections"
      create: true
      slug: "{{slug}}"
      extension: yml
      format: yml
      identifier_field: "title"
      summary: "{{title}}"
      sortable_fields: ["order", "title"]
      fields:
          - {
                label: "Order",
                name: "order",
                widget: "number",
                default: 1,
                hint: "Controls display order on the site (1 = first)",
            }
          - { label: "Section Title", name: "title", widget: "string" }
          - label: "Item Groups"
            name: "groups"
            widget: "list"
            label_singular: "Item Group"
            fields:
                - { label: "Group Title", name: "title", widget: "string", required: false }
                - label: "Items"
                  name: "items"
                  widget: "list"
                  label_singular: "Menu Item"
                  fields:
                      - { label: "Title", name: "title", widget: "string" }
                      - { label: "Price", name: "price", widget: "number", value_type: "float" }
                      - { label: "Note", name: "note", widget: "text", required: false }
                      - { label: "Choose Your Beans", name: "choose_beans", widget: "boolean", default: false }
