backend:
    name: github
    repo: onedaywebsites/brewinghood
    branch: main
    base_url: https://sveltia-cms-auth.onedaywebsites-channel.workers.dev

media_folder: "assets/uploads"

collections:
    - name: "settings"
      label: "Site Settings"
      files:
          - name: "general"
            label: "Restaurant Info"
            file: "_data/settings.yml"
            fields:
                - { label: "Business Name", name: "business_name", widget: "string" }
                - { label: "Tagline", name: "tagline", widget: "string" }
                - { label: "Phone", name: "phone", widget: "string" }
                - { label: "Address", name: "address", widget: "string" }
                - { label: "Hours", name: "hours", widget: "string" }
                - label: "Menu Items"
                  name: "menu_items"
                  widget: "list"
                  fields:
                      - { label: "Item Name", name: "name", widget: "string" }
                      - { label: "Description", name: "description", widget: "string" }
                      - { label: "Price", name: "price", widget: "string" }
