---
layout: default
title: Home
---

<section class="hero">
    <h2>{{ site.data.settings.tagline }}</h2>
</section>

<section class="preview">
    <h2>On Tap</h2>
    {% for item in site.data.settings.menu_items limit:3 %}
    <div class="menu-item">
        <h3>{{ item.name }}</h3>
        <p>{{ item.description }}</p>
        <span class="price">${{ item.price }}</span>
    </div>
    {% endfor %}
    <a href="{{ site.baseurl }}/menu">See full menu →</a>
</section>
